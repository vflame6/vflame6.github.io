<script>
(function () {
  var canvas = document.getElementById('networkCanvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var w = 0, h = 0;
  var dpr = Math.max(1, window.devicePixelRatio || 1);
  function resize() {
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  var lastInteraction = 0;
  function bump() { lastInteraction = Date.now(); }
  window.addEventListener('mousemove', bump, { passive: true });
  window.addEventListener('touchstart', bump, { passive: true });
  window.addEventListener('touchmove', bump, { passive: true });
  window.addEventListener('scroll', bump, { passive: true });

  var count = window.innerWidth < 768 ? 40 : 80;
  var linkDist = 150;
  var particles = [];
  for (var i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      radius: Math.random() * 2 + 1
    });
  }

  var mx = 0, my = 0;
  window.addEventListener('mousemove', function (e) { mx = e.clientX; my = e.clientY; }, { passive: true });

  function update() {
    var active = Date.now() - lastInteraction < 2000;
    for (var k = 0; k < particles.length; k++) {
      var p = particles[k];
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
      if (active) {
        var dx = p.x - mx, dy = p.y - my;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 200 && dist > 0) {
          var force = (200 - dist) / 200;
          p.vx += (dx / dist) * force * 0.15;
          p.vy += (dy / dist) * force * 0.15;
        }
        if (Math.sqrt(p.vx * p.vx + p.vy * p.vy) > 0.8) { p.vx *= 0.95; p.vy *= 0.95; }
      } else {
        if (Math.random() < 0.05) {
          p.vx += (Math.random() - 0.5) * 0.15;
          p.vy += (Math.random() - 0.5) * 0.15;
        }
        if (Math.sqrt(p.vx * p.vx + p.vy * p.vy) > 2.5) { p.vx *= 0.95; p.vy *= 0.95; }
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#ef4444';
    for (var k = 0; k < particles.length; k++) {
      var p = particles[k];
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fill();
      for (var j = k + 1; j < particles.length; j++) {
        var q = particles[j];
        var dx = p.x - q.x, dy = p.y - q.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < linkDist) {
          var t = 1 - dist / linkDist;
          ctx.strokeStyle = 'rgba(239, 68, 68, ' + (t * 0.5).toFixed(3) + ')';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(function () {
      if (!reduced) update();
      draw();
    });
  }

  draw();
})();
</script>
