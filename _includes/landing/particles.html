<script defer
        src="https://cdn.jsdelivr.net/npm/@tsparticles/slim@4.1.3/tsparticles.slim.bundle.min.js"
        integrity="sha384-Heyud2Zc7UkMC1JuQhtQgjp7pwyW1fo7zTIBDPryVwN1lrRDe4X3+B3NqhKZABYC"
        crossorigin="anonymous"></script>
<script>
  window.addEventListener('DOMContentLoaded', function () {
    if (typeof tsParticles === 'undefined') return;
    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    tsParticles.load({
      id: 'tsparticles',
      options: {
        background: { color: '#000000' },
        fpsLimit: 60,
        particles: {
          number: { value: window.innerWidth < 768 ? 40 : 80 },
          color:  { value: '#ef4444' },
          opacity: { value: 0.6 },
          size:   { value: { min: 1, max: 3 } },
          links:  { enable: true, distance: 150, color: '#ef4444', opacity: 0.3, width: 1 },
          move:   { enable: !reduced, speed: 0.5, outModes: 'bounce' }
        },
        interactivity: {
          events: { onHover: { enable: !reduced, mode: 'grab' } },
          modes:  { grab: { distance: 200, links: { opacity: 0.6 } } }
        },
        detectRetina: true
      }
    });
  });
</script>
